# Requires LlamaStack Kubernetes Operator CRDs in the cluster, e.g.:
#   oc apply -f https://github.com/llamastack/llama-stack-k8s-operator/releases/latest/download/operator.yaml
apiVersion: llamastack.io/v1alpha1
kind: LlamaStackDistribution
metadata:
  name: llamastack
  namespace: agentic-demo
spec:
  replicas: 1
  server:
    distribution:
      # Using image skips the operator's built-in distribution name map (see README if you prefer name: starter).
      image: docker.io/llamastack/distribution-starter:latest
    userConfig:
      configMapName: llamastack-server-config
    storage:
      size: 20Gi
      mountPath: "/.llama"
    containerSpec:
      port: 8321
      resources:
        requests:
          cpu: "500m"
          memory: "2Gi"
        limits:
          cpu: "2"
          memory: "8Gi"
      env:
        - name: SQLITE_STORE_DIR
          value: "/.llama/distributions/starter"
        - name: VLLM_URL
          valueFrom:
            configMapKeyRef:
              name: llamastack-mcp-endpoints
              key: VLLM_URL
        - name: VLLM_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: llamastack-credentials
              key: vllm-api-token
        # Set to "false" if vLLM is HTTPS with a cluster CA the image does not trust.
        - name: VLLM_TLS_VERIFY
          value: "false"
        - name: MCP_GITHUB_SSE_URL
          valueFrom:
            configMapKeyRef:
              name: llamastack-mcp-endpoints
              key: MCP_GITHUB_SSE_URL
        - name: MCP_OPENSHIFT_SSE_URL
          valueFrom:
            configMapKeyRef:
              name: llamastack-mcp-endpoints
              key: MCP_OPENSHIFT_SSE_URL
