apiVersion: v1
kind: Secret
metadata:
  name: github-mcp-pat
  namespace: agentic-demo
type: Opaque
stringData:
  # Raw token only: ghp_…, github_pat_…, ghs_…, etc. Do not include "Bearer " (nginx adds it).
  # Avoid trailing newlines (use echo -n when creating from a shell).
  GITHUB_PERSONAL_ACCESS_TOKEN: "REPLACE_WITH_GITHUB_PAT"
