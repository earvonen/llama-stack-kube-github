# User Workload Monitoring for agent workloads. Each Service must carry label app=<name>
# and expose Prometheus metrics on port name `http` at path `/metrics`.
# Deployment/Service names should match the app label for kube alerts in prometheusrule-agentic-demo.yaml.
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: developer-agent
  labels:
    app.kubernetes.io/part-of: agents
spec:
  selector:
    matchLabels:
      app: developer-agent
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scheme: http
