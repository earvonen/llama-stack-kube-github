# Llama Stack UI (playground) — https://llamastack.github.io/docs/distributions/llama_stack_ui
# Browser → this UI (Next.js); UI server calls the API at LLAMA_STACK_BACKEND_URL (in-cluster).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llamastack-ui
  namespace: agentic-demo
  labels:
    app: llamastack-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llamastack-ui
  template:
    metadata:
      labels:
        app: llamastack-ui
    spec:
      securityContext:
        fsGroup: 1000940000
      containers:
        - name: ui
          image: docker.io/llamastack/ui:latest
          ports:
            - containerPort: 8322
              protocol: TCP
          env:
            - name: LLAMA_STACK_BACKEND_URL
              value: "http://llamastack-service:8321"
            - name: LLAMA_STACK_UI_PORT
              value: "8322"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            tcpSocket:
              port: 8322
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8322
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: llamastack-ui
  namespace: agentic-demo
  labels:
    app: llamastack-ui
spec:
  selector:
    app: llamastack-ui
  ports:
    - name: http
      port: 8322
      targetPort: 8322
      protocol: TCP
